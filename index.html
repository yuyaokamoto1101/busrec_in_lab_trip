<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>バスレク この人はだあれ? / Who Is This Person?</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=DotGothic16&display=swap" rel="stylesheet">
<style>
:root{
  /* 諏訪湖の夏: 深い湖の青・針葉樹の緑・夏空 / Lake Suwa summer: deep lake blue, conifer green, summer sky */
  --bg:#FBF4E7; --ink:#3A2A16; --sub:#8A7455; --line:#EAD9B8;
  --amber:#E0762A; --amber-dk:#B8591A; --board:#2B2013; --dot:#FFC77A;
  --ok:#2E9E5B; --ng:#D9482E; --card:#FFFCF4;
  /* 組紐カラー / kumihimo braid accent */
  --himo:#E8582F; --himo2:#F2B33D;
}
body{background:#0A5583; display:flex; flex-direction:column; min-height:100vh;}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; background:var(--bg); color:var(--ink);
  font-family:'M PLUS Rounded 1c',system-ui,sans-serif;}
.wrap{max-width:540px; margin:0 auto; padding:16px 16px 80px;}
.board{background:var(--board); border-radius:14px; padding:14px 16px;
  color:var(--dot); font-family:'DotGothic16',monospace; letter-spacing:.04em;
  display:flex; justify-content:space-between; align-items:baseline; gap:8px;
  border-bottom:4px solid; border-image:linear-gradient(90deg,var(--himo),var(--himo2),var(--amber)) 1;}
.board .big{font-size:18px; line-height:1.3;}
.board .small{font-size:12px; opacity:.9; line-height:1.3; text-align:right;}
.card{background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:14px 16px; margin-top:12px; box-shadow:0 3px 10px rgba(8,50,80,.16);}
.h{font-size:15px; font-weight:800; margin:0 0 8px; line-height:1.4;}
.sub{color:var(--sub); font-size:12.5px; line-height:1.6; margin:4px 0;}
.en{opacity:.72; font-size:.92em;}
button{font-family:inherit; font-weight:800; border:none; border-radius:12px;
  padding:12px 16px; font-size:15px; cursor:pointer; line-height:1.35;}
.btn-p{background:var(--amber); color:#fff; width:100%;}
.btn-p:disabled{background:#E3E6E0; color:#9AA5A0; cursor:default;}
.btn-o{background:#fff; color:var(--ink); border:1.5px solid var(--ink); width:100%;}
.btn-sm{padding:8px 12px; font-size:13px; border-radius:10px; width:auto;}
input,select{font-family:inherit; font-size:16px; padding:11px 12px; width:100%;
  border:1.5px solid var(--line); border-radius:12px; background:#fff; color:var(--ink);}
.route{position:relative; margin:18px 4px 6px; padding-left:22px;}
.route::before{content:""; position:absolute; left:8px; top:6px; bottom:6px;
  width:4px; border-radius:2px;
  background:repeating-linear-gradient(180deg, var(--himo) 0 8px, var(--himo2) 8px 12px, var(--himo) 12px 16px, transparent 16px 24px);}
.stop{position:relative; padding:0 0 16px;}
.stop::before{content:""; position:absolute; left:-20px; top:4px; width:12px; height:12px;
  border-radius:50%; background:#fff; border:3px solid var(--himo);}
.stop.locked::before{border-color:#C4CCC6; background:#E9EDE8;}
.stopLabel{font-size:11.5px; color:var(--sub); font-weight:700;}
.stopVal{font-size:17px; font-weight:800; margin-top:2px;}
.stopVal.hidden{color:#B9C2BC; letter-spacing:.2em;}
.pill{display:inline-block; border-radius:999px; padding:3px 10px; font-size:12px; font-weight:800;}
.pill.ok{background:#E2F3E8; color:var(--ok);}
.pill.ng{background:#FBE4DC; color:var(--ng);}
.pill.wait{background:#F7E6C8; color:var(--amber-dk);}
.choiceGrid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
.choice{background:#fff; border:1.5px solid var(--line); border-radius:12px;
  padding:12px 8px; font-size:15px; font-weight:800; color:var(--ink);}
.choice.sel{border-color:var(--amber); background:#FBE7D2;}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{color:var(--sub); font-size:11px; text-align:left; padding:6px 4px; border-bottom:1px solid var(--line); line-height:1.3;}
td{padding:8px 4px; border-bottom:1px solid #F0E4C8; font-weight:700;}
.r{text-align:right;}
.rankNum{font-family:'DotGothic16',monospace; font-size:15px;}
tr.me{background:#FBE7D2;}
.orderTag{display:inline-flex; align-items:center; justify-content:center;
  min-width:22px; height:22px; border-radius:50%; background:var(--ink); color:#fff;
  font-size:12px; font-weight:800; margin-right:8px;}
.hintPick{display:flex; align-items:center; gap:8px; width:100%; text-align:left;
  background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:10px 12px;
  margin-top:8px; font-size:14px;}
.hintPick.on{border-color:var(--amber); background:#FBE7D2;}
.topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px;}
.brand{font-weight:800; font-size:13.5px; letter-spacing:.02em; line-height:1.3;}
.link{background:none; border:none; color:var(--sub); font-size:12px; text-decoration:underline; padding:4px; width:auto; flex-shrink:0;}
.bigPts{font-family:'DotGothic16',monospace; font-size:28px; color:var(--amber-dk);}
.row2{display:flex; justify-content:space-between; align-items:center;}
.err{color:var(--ng);}
code{background:#F2E6CC; border-radius:6px; padding:1px 6px; font-size:12px;}
.podium{display:flex; align-items:flex-end; gap:8px; margin-top:16px;}
.pcol{flex:1; text-align:center; min-width:0;}
.pname{font-weight:800; font-size:13.5px; margin-bottom:6px; min-height:20px; word-break:break-all;}
.pname.hiddenName{color:#B9C2BC; letter-spacing:.25em;}
.ppts{font-family:'DotGothic16',monospace; font-size:13px; color:var(--amber-dk); margin-bottom:4px; min-height:16px;}
.pbox{border-radius:12px 12px 0 0; background:var(--amber); font-family:'DotGothic16',monospace;
  font-size:22px; color:#3A2A00; display:flex; align-items:flex-start; justify-content:center; padding-top:8px;}
.pbox.p1{min-height:96px; background:linear-gradient(180deg,#FFD35C,var(--himo2)); color:#5C3A00;}
.pbox.p2{min-height:70px; background:#D7DBD3; color:#4A5257;}
.pbox.p3{min-height:52px; background:#E5B98A; color:#5C3A16;}
.finalBadge{animation:pulseB 1.1s ease-in-out infinite;}
@keyframes pulseB{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.sceneHead{font-size:20px; font-weight:800; text-align:center; margin:8px 0 4px; line-height:1.4;}
.sceneSub{text-align:center;}
.resultBanner{border-radius:14px; text-align:center; padding:18px 12px 14px; margin-top:10px;}
.resultBanner.ok{background:#E2F3E8; border:2px solid var(--ok);}
.resultBanner.ng{background:#FBE4DC; border:2px solid var(--ng);}
.resultBig{font-size:32px; font-weight:800; line-height:1.2;}
.resultBanner.ok .resultBig{color:var(--ok);}
.resultBanner.ng .resultBig{color:var(--ng);}
.resultPts{font-family:'DotGothic16',monospace; font-size:24px; margin-top:6px; color:var(--amber-dk);}
.resultRank{font-size:14px; font-weight:800; margin-top:6px;}
.speedPop{margin-top:10px; border-radius:12px; padding:10px 12px; text-align:center;
  font-weight:800; font-size:16px; color:#fff;
  background:linear-gradient(90deg,var(--himo),var(--himo2));
  animation:popIn .5s cubic-bezier(.2,1.4,.4,1) both;}
.speedPop .big{font-size:20px;}
@keyframes popIn{0%{transform:scale(.4); opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1); opacity:1}}
/* ---- 上下の帯 / top & bottom scenery bands ---- */
.skyband{position:relative; overflow:hidden; height:172px; flex:0 0 auto;}
.lakebg{flex:1 0 auto; background:linear-gradient(180deg,#0E5C92 0%, #0A5583 40%, #083F63 100%);
  border-radius:0 0 28px 28px; padding-bottom:30px;}
.skyband .bandart{position:absolute; inset:0; width:100%; height:100%;}
.shoreband{flex:0 0 auto; height:70px; margin-top:10px;}
.shoreband .bandart{display:block; width:100%; height:100%;}
.wrap{position:relative; z-index:1;}
/* 濃い湖面の上に置くテキストは明色に / light text on the deep-lake background */
.topbar .brand{color:#EAF6FC;}
.link{color:#B9DCEE;}
.wrap > p.sub{color:#E8F4FB;}
/* ---- 飛来する機体と鳥: 周期の一部だけ画面を横切り、残りは休む
   occasional flybys: cross during a fraction of a long cycle, then rest ---- */
.flyer{position:absolute; will-change:transform; transform:translateX(-320px); pointer-events:none;}
.flyer svg{display:block;}
@keyframes flick{from{opacity:.28}to{opacity:.62}}
.propDisc{animation:flick .16s linear infinite alternate;}
.mirror{transform:scaleX(-1); transform-origin:center; transform-box:fill-box;}
@keyframes p1{0%{transform:translate(-320px,6px)}16%{transform:translate(calc(100vw + 320px),6px)}100%{transform:translate(calc(100vw + 320px),6px)}}
.fly1{top:24px; animation:p1 115s linear infinite; animation-delay:-6s;}
@keyframes p2{0%{transform:translate(-220px,28px)}12%{transform:translate(calc(100vw + 220px),-12px)}100%{transform:translate(calc(100vw + 220px),-12px)}}
.fly2{top:40px; animation:p2 90s linear infinite; animation-delay:-50s;}
@keyframes p3{0%{transform:translate(-200px,0)}20%{transform:translate(calc(100vw + 200px),0)}100%{transform:translate(calc(100vw + 200px),0)}}
.fly3{top:66px; animation:p3 135s linear infinite; animation-delay:-96s;}
@keyframes p4{0%{transform:translate(calc(100vw + 200px),0)}18%{transform:translate(-200px,0)}100%{transform:translate(-200px,0)}}
.fly4{top:52px; animation:p4 100s linear infinite; animation-delay:-32s;}
@keyframes p5{0%{transform:translate(-200px,-12px)}15%{transform:translate(calc(100vw + 200px),16px)}100%{transform:translate(calc(100vw + 200px),16px)}}
.fly5{top:82px; animation:p5 105s linear infinite; animation-delay:-72s;}
@keyframes p6{0%{transform:translate(calc(100vw + 200px),18px)}16%{transform:translate(-200px,-12px)}100%{transform:translate(-200px,-12px)}}
.fly6{top:94px; animation:p6 120s linear infinite; animation-delay:-14s;}
@keyframes p7{0%{transform:translate(-200px,0)}17%{transform:translate(calc(100vw + 200px),0)}100%{transform:translate(calc(100vw + 200px),0)}}
.fly7{top:58px; animation:p7 95s linear infinite; animation-delay:-84s;}
@keyframes p8{0%{transform:translate(calc(100vw + 240px),0)}26%{transform:translate(-240px,10px)}100%{transform:translate(-240px,10px)}}
.fly8{top:10px; animation:p8 130s linear infinite; animation-delay:-46s;}
@keyframes p9{0%{transform:translate(calc(100vw + 180px),0)}16%{transform:translate(-180px,0)}100%{transform:translate(-180px,0)}}
.fly9{top:48px; animation:p9 110s linear infinite; animation-delay:-102s;}
@keyframes p10{0%{transform:translate(-200px,0)}18%{transform:translate(calc(100vw + 200px),0)}100%{transform:translate(calc(100vw + 200px),0)}}
.fly10{top:116px; animation:p10 108s linear infinite; animation-delay:-24s;}
/* カーブを描いて突っ切る2機 / two gently curving passes (top view) */
@keyframes p11{0%{transform:translate(-240px,-8px) rotate(12deg)}9%{transform:translate(calc(50vw - 35px),18px) rotate(1deg)}18%{transform:translate(calc(100vw + 240px),-6px) rotate(-14deg)}100%{transform:translate(calc(100vw + 240px),-6px) rotate(-14deg)}}
.fly11{top:16px; animation:p11 98s ease-in-out infinite; animation-delay:-62s;}
@keyframes p12{0%{transform:translate(calc(100vw + 220px),16px) rotate(10deg)}8%{transform:translate(calc(50vw - 28px),-8px) rotate(0deg)}16%{transform:translate(-220px,10px) rotate(-12deg)}100%{transform:translate(-220px,10px) rotate(-12deg)}}
.fly12{top:56px; animation:p12 88s ease-in-out infinite; animation-delay:-36s;}
/* 渡り鳥 / migrating birds */
@keyframes p13{0%{transform:translate(calc(100vw + 160px),-6px)}30%{transform:translate(-160px,10px)}100%{transform:translate(-160px,10px)}}
.fly13{top:30px; animation:p13 70s linear infinite; animation-delay:-20s;}
@keyframes p14{0%{transform:translate(-140px,4px)}26%{transform:translate(calc(100vw + 140px),-6px)}100%{transform:translate(calc(100vw + 140px),-6px)}}
.fly14{top:100px; animation:p14 82s linear infinite; animation-delay:-58s;}
.wingFlap{animation:flap .45s ease-in-out infinite alternate; transform-box:fill-box; transform-origin:center;}
@keyframes flap{from{transform:scaleY(1)}to{transform:scaleY(-.5)}}
/* ---- 湖面を行き交う船 / boats crossing the lake ---- */
.bob{display:block; animation:bobK 3.2s ease-in-out infinite alternate;}
@keyframes bobK{from{transform:translateY(0) rotate(-.8deg)}to{transform:translateY(1.8px) rotate(.9deg)}}
@keyframes b1{0%{transform:translateX(-70px)}20%{transform:translateX(calc(100vw + 70px))}100%{transform:translateX(calc(100vw + 70px))}}
.boat1{top:112px; animation:b1 120s linear infinite; animation-delay:-32s;}
@keyframes b2{0%{transform:translateX(calc(100vw + 80px))}26%{transform:translateX(-80px)}100%{transform:translateX(-80px)}}
.boat2{top:124px; animation:b2 145s linear infinite; animation-delay:-92s;}
@keyframes b3{0%{transform:translateX(-110px)}9%{transform:translateX(calc(100vw + 110px))}100%{transform:translateX(calc(100vw + 110px))}}
.boat3{top:140px; animation:b3 78s linear infinite; animation-delay:-14s;}
@keyframes b4{0%{transform:translateX(calc(100vw + 60px))}24%{transform:translateX(-60px)}100%{transform:translateX(-60px)}}
.boat4{top:118px; animation:b4 132s linear infinite; animation-delay:-62s;}
@media (prefers-reduced-motion: reduce){.flyer,.propDisc,.wingFlap,.bob{animation:none;}}
</style>

<script>
/* ================================================================
   ▼▼▼ セットアップ / SETUP: ここを自分のFirebase設定に書き換える
   Replace the values below with your own Firebase config.
   (README.md の手順1〜4を参照 / see README.md steps 1-4)
   ================================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyADoI3WaRm7z4PxgrCnKWqG9NK6QA2xvy0",
  authDomain: "busrec-c3ab4.firebaseapp.com",
  databaseURL: "https://busrec-c3ab4-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "busrec-c3ab4",
  storageBucket: "busrec-c3ab4.firebasestorage.app",
  messagingSenderId: "431030293527",
  appId: "1:431030293527:web:2644e9f5daf71fe1c33852"
};
const ROOM = "bus1"; // 別のグループで同時開催するときはここを変える / change this to run separate groups at once
/* ================================================================ */

const $app = document.getElementById("app");
const configured = firebaseConfig.databaseURL && !firebaseConfig.databaseURL.includes("ここに");

/* 日本語 / English を並べて1つの文字列にする / join JA and EN into one bilingual string */
function T(ja, en){ return ja + " / " + en; }

let db = null, roomRef = null, initError = null;
if (configured) {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    roomRef = db.ref("rooms/" + ROOM);
  } catch (e) {
    initError = e;
  }
}

/* エラーを説明して表示する / explain an error in bilingual text */
function explainError(e){
  const msg = (e && (e.code || e.message)) ? String(e.code || e.message) : String(e);
  let hint = "";
  if (/PERMISSION_DENIED|permission_denied/i.test(msg)) {
    hint = T(
      "データベースのルールで書き込みが拒否されています。テストモードの期限切れの可能性が高いです。Firebaseコンソール → Realtime Database → ルール で、READMEの手順2にあるルールに書き換えて「公開」してください。",
      "The database rules are rejecting writes. Test mode has likely expired. In the Firebase console go to Realtime Database → Rules, paste the rules from README step 2, and click Publish."
    );
  } else if (/Cannot parse|Can't determine|Invalid|URL/i.test(msg)) {
    hint = T(
      "databaseURL の値が正しくない可能性があります。Realtime Databaseの画面上部に表示されるURLをそのまま貼ってください。",
      "The databaseURL value may be wrong. Copy the URL shown at the top of the Realtime Database page exactly as-is."
    );
  } else if (/network|unavailable|timeout/i.test(msg)) {
    hint = T("ネットワークに接続できていません。通信環境を確認してください。", "No network connection. Please check your connection.");
  }
  return T("エラー", "Error") + ": " + msg + (hint ? "\n\n" + T("対処", "Fix") + ": " + hint : "");
}

/* ---------- app state ---------- */
let S = { game: null, round: null, history: [], players: {}, scene: null }; // synced from Firebase
let mode = "entry";           // entry | player | host
let me = null;                // {name, key}
let ui = { picking: false, sel: null, target: "", order: [], practice: false, mult: 1, final: false, pinError: "", entryName: "", entryPin: "" };
let subscribed = false;
let entryPeople = null;        // トップ画面用の名簿キャッシュ / cached name list for the entry screen
let entryPeopleLoading = false;

function subscribe() {
  if (subscribed || !roomRef) return;
  subscribed = true;
  roomRef.on("value", (snap) => {
    const v = snap.val() || {};
    S.game = v.game || null;
    S.round = v.round || null;
    S.history = v.history ? Object.values(v.history) : [];
    S.players = v.players || {};
    S.scene = v.scene || null;
    if (mode !== "entry") render();
  });
}

/* ---------- helpers ---------- */
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function nameToKey(name){
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return name.replace(/[.#$/\[\]\s]/g, "") + "_" + h.toString(36);
}
function pointsFor(total, k, mult){ return Math.max(0, (total - k + 1) * 100) * (mult || 1); }
/* 正解者の回答速度トップ3ボーナス / speed bonus for top-3 fastest correct answers */
const SPEED_BONUS = [150, 100, 50];
function speedRanking(rid, target){
  return answersFor(rid, target).filter(x => x.a.choice === target);
}
function speedBonusFor(pos, mult){ return (SPEED_BONUS[pos - 1] || 0) * (mult || 1); }
/* 出題対象者へのボーナス: 他の参加者が取り損ねた点数の平均(全員即答なら0、誰も当てられなければ満点相当)
   Subject bonus: average points the others FAILED to earn (0 if everyone answers instantly, full if nobody gets it) */
function subjectBonus(rid, target, total, mult, practice){
  if (practice) return 0;
  const others = playerList().filter(p => p.name !== target);
  if (!others.length) return 0;
  const max = total * 100 * (mult || 1);
  let sum = 0;
  others.forEach(p => {
    const a = p.answers[rid];
    const earned = (a && a.choice === target) ? pointsFor(total, a.k, mult) : 0;
    sum += max - earned;
  });
  return Math.round(sum / others.length / 10) * 10;
}
function playerList(){ return Object.entries(S.players).map(([key, p]) => ({ ...p, key, answers: p.answers || {} })); }
function computeScores(){
  const rows = playerList().map(p => {
    let score = 0, correctCount = 0;
    S.history.forEach(r => {
      if (r.practice) return; // 例題は得点対象外 / practice rounds don't count
      const a = p.answers[r.id];
      if (a && a.choice === r.target) { score += pointsFor(r.total, a.k, r.mult); correctCount++; }
    });
    return { name: p.name, score, correctCount };
  });
  /* 出題対象者ボーナスを加算 / add subject bonuses */
  S.history.forEach(r => {
    if (r.practice) return;
    const row = rows.find(x => x.name === r.target);
    if (row) row.score += subjectBonus(r.id, r.target, r.total, r.mult, r.practice);
  });
  /* 回答速度トップ3ボーナスを加算 / add speed top-3 bonuses */
  S.history.forEach(r => {
    if (r.practice) return;
    speedRanking(r.id, r.target).slice(0, 3).forEach((x, i) => {
      const row = rows.find(y => y.name === x.name);
      if (row) row.score += speedBonusFor(i + 1, r.mult);
    });
  });
  rows.sort((a,b) => b.score - a.score || a.name.localeCompare(b.name, "ja"));
  let rank = 0, prev = null;
  rows.forEach((r,i) => { if (r.score !== prev) { rank = i + 1; prev = r.score; } r.rank = rank; });
  return rows;
}
function roundOrder(){ return S.round && S.round.order ? S.round.order : []; }
/* このラウンドの回答を回答時刻順に並べる / answers for a round, sorted by answer time */
function answersFor(rid, target){
  return playerList()
    .filter(p => p.name !== target && p.answers[rid])
    .map(p => ({ name: p.name, a: p.answers[rid] }))
    .sort((x, y) => (x.a.ts || 0) - (y.a.ts || 0));
}
function qNum(){ return S.history.length + (S.round ? 1 : 0); }

/* simple CSV parser (quotes + BOM 対応) */
function parseCSV(text){
  text = text.replace(/^\uFEFF/, "").replace(/\r\n?/g, "\n");
  const rows = []; let row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"'){ if (text[i+1] === '"'){ cell += '"'; i++; } else inQ = false; }
      else cell += c;
    } else if (c === '"') inQ = true;
    else if (c === ",") { row.push(cell); cell = ""; }
    else if (c === "\n") { row.push(cell); rows.push(row); row = []; cell = ""; }
    else cell += c;
  }
  row.push(cell); rows.push(row);
  return rows.filter(r => r.some(x => x.trim() !== ""));
}

function leaderboardHtml(rows, meName){
  if (!rows.length) return `<p class="sub">${T("まだ参加者がいません。", "No participants yet.")}</p>`;
  return `<table><thead><tr>
      <th>${T("順位","Rank")}</th><th>${T("名前","Name")}</th>

      <td class="r">${r.correctCount}</td><td class="r rankNum">${r.score}</td></tr>`).join("") +
    `</tbody></table>`;
}
function routeHtml(order, revealed, hintValues, showAll, finished, target){
  let s = `<div class="route">`;
  order.forEach((col, i) => {
    const open = showAll || i < revealed;
    const statusTag = showAll ? (i < revealed ? T("公開中","shown") : T("未公開","hidden")) : "";
    s += `<div class="stop ${open ? "" : "locked"}">
      <div class="stopLabel">${T("ヒント","Hint")}${i+1} ・ ${open ? esc(col) : "?????"}${statusTag ? " (" + statusTag + ")" : ""}</div>
      <div class="stopVal ${open ? "" : "hidden"}">${open ? esc(hintValues[col]) : "・・・・・"}</div></div>`;
  });
  if (!showAll){
    s += `<div class="stop locked"><div class="stopLabel">${T("終点・こたえ","Final stop: Answer")}</div>
      <div class="stopVal ${finished ? "" : "hidden"}">${finished ? esc(target) : "?????"}</div></div>`;
  }
  return s + `</div>`;
}

/* ---------- 演出 / presentation scenes ---------- */
function podiumGroups(scores){
  // 上位3順位のグループ(同点は同順位でまとめる) / top-3 rank groups (ties grouped)
  const groups = [];
  scores.forEach(r => {
    let g = groups.find(x => x.rank === r.rank);
    if (!g) { g = { rank: r.rank, score: r.score, names: [] }; groups.push(g); }
    g.names.push(r.name);
  });
  groups.sort((a,b) => a.rank - b.rank);
  return groups.slice(0, 3);
}
function podiumHtml(groups, revealedSteps){
  // revealedSteps: 1=3位から公開, 2=+2位, 3=+1位 (グループ数が少なければ詰める)
  const total = groups.length;
  const shown = (idx) => revealedSteps >= (total - idx); // 下位から公開 / reveal from the bottom up
  const col = (g, cls, medal, idx) => {
    if (!g) return "";
    const open = shown(idx);
    return `<div class="pcol">
      <div class="pname ${open ? "" : "hiddenName"}">${open ? g.names.map(esc).join("・") : "???"}</div>
      <div class="ppts">${open ? g.score + " pt" : ""}</div>
      <div class="pbox ${cls}">${medal}${g.rank}</div>
    </div>`;
  };
  // 表示順: 2位・1位・3位 / layout order: 2nd, 1st, 3rd
  return `<div class="podium">${col(groups[1], "p2", "", 1)}${col(groups[0], "p1", "👑", 0)}${col(groups[2], "p3", "", 2)}</div>`;
}
function sceneHtml(scene, scores){
  if (scene.type === "standings") {
    return `<div class="card">
      <p class="sceneHead">📊 ${T("暫定順位発表!","Current Standings!")}</p>
      ${leaderboardHtml(scores, (mode === "player" && me) ? me.name : null)}
    </div>`;
  }
  if (scene.type === "results") {
    const groups = podiumGroups(scores);
    const steps = scene.revealed || 0;
    const done = steps >= groups.length;
    let body;
    if (steps === 0) {
      body = `<p class="sceneSub sub" style="font-size:15px; margin-top:10px">🥁 ${T("ドキドキ…発表を待ちましょう!","Drumroll... get ready!")}</p>`;
    } else {
      body = podiumHtml(groups, steps) +
        (done ? `<div style="margin-top:14px">${leaderboardHtml(scores, (mode === "player" && me) ? me.name : null)}</div>` : "");
    }
    return `<div class="card">
      <p class="sceneHead">${done ? "🎉" : "🏆"} ${T("結果発表!","Final Results!")}</p>
      ${body}
    </div>`;
  }
  return "";
}

  const myAnswer = r && meRec.answers ? (meRec.answers[r.id] || null) : null;
  const order = roundOrder();
  const total = order.length, k = r ? (r.revealed || 0) : 0;
  const finished = r && r.status === "finished";
  const mult = r ? (r.mult || 1) : 1;
  const practice = r ? !!r.practice : false;

    } else {
      action = `<button class="btn-p" id="btnOpenPick" style="margin-top:6px">${practice
        ? T("いま答える(例題・得点なし)","Answer now (practice, no points)")
        : T("いま答える(正解なら +"+potential+"pt)","Answer now (+"+potential+"pt if correct)")}</button>`;
    }
    mid = `<div class="card"><p class="h">${T("この人はだあれ?","Who is this?")} ${badge}</p>` +
      routeHtml(order, k, r.hintValues || {}, false, finished, r.target) + action + `</div>`;
  }

  let boardLeft = r ? T("第"+qNum()+"問","Q"+qNum()) : T("つぎの問題を待っています","Waiting for next question");
  let boardRight = r ? T("ヒント","Hint")+" "+k+"/"+total : T(me.name+" さん", me.name);
  if (S.scene) {
    mid = sceneHtml(S.scene, scores);
    boardLeft = S.scene.type === "results" ? T("結果発表","Results") : T("暫定順位","Standings");
    boardRight = T(me.name+" さん", me.name);
  } else if (r && r.final) {
    boardLeft = "🏁 " + boardLeft;
  }

  $app.innerHTML =
    `<div class="topbar"><span class="brand">${T("バスレク この人はだあれ?","Bus Game: Who Is This?")}</span>
     <button class="link" id="btnLeave">${T("名前を変える","Change name")}</button></div>` +
    boardHtml(boardLeft, boardRight) +
    `<div class="card">
      <div class="row2">
        <div><div class="sub">${T(esc(me.name)+" さんの得点", esc(me.name)+"'s score")}</div><div class="bigPts">${myRow ? myRow.score : 0} pt</div></div>
        <div style="text-align:right"><div class="sub">${T("暫定順位","Current rank")}</div><div class="bigPts" style="font-size:15px; color:var(--sub)">${T("非公開","Hidden")}</div></div>
      </div>
      <p class="sub" style="margin:8px 0 0">${T("順位は運営が発表するまで表示されません。","Rankings are only shown when the host reveals them.")}</p>
    </div>` +
    mid;

  document.getElementById("btnLeave").onclick = () => { mode = "entry"; ui.picking = false; ui.sel = null; render(); };
  const open = document.getElementById("btnOpenPick");
  if (open) open.onclick = () => { ui.picking = true; render(); };
  const cancel = document.getElementById("btnCancel");
  if (cancel) cancel.onclick = () => { ui.picking = false; ui.sel = null; render(); };
  document.querySelectorAll("[data-pick]").forEach(b => b.onclick = () => { ui.sel = b.dataset.pick; render(); });
  const submit = document.getElementById("btnSubmit");
  if (submit) submit.onclick = async () => {
    if (!ui.sel || !r || myAnswer) return;
    const ansRef = roomRef.child(`players/${me.key}/answers/${r.id}`);
    await ansRef.transaction(cur => cur || { choice: ui.sel, k, ts: Date.now() });
    ui.picking = false; ui.sel = null; render();
  };
}

function renderHost(){
  const g = S.game, r = S.round;
  const scores = computeScores();
  const players = playerList();
  const cols = g && g.cols ? g.cols : [];
  const people = g && g.people ? g.people : [];
  const person = people.find(p => p.name === ui.target) || null;
  const order = roundOrder();
  /* フォームに3問以上答えている人だけ出題対象にできる / only people with 3+ filled hints can be subjects */
  const eligible = people.filter(p => Object.values(p.hints || {}).filter(v => String(v).trim() !== "").length >= 3);
  const excluded = people.length - eligible.length;

  let makeCard = "";
  if (people.length && !r) {
    const usable = person ? cols.filter(c => (person.hints[c] || "").trim() !== "") : [];
    const skipped = person ? cols.length - usable.length : 0;
    makeCard = `<div class="card"><p class="h">${T("次の問題をつくる","Create next question")}(${T("第"+(S.history.length+1)+"問","Q"+(S.history.length+1))})</p>
      <p class="sub">${T(
        "答えにする人を選び、使いたいヒントだけを出したい順にタップしてください。タップしなかった項目は出題されません。",
        "Choose who the answer is, then tap only the hints you want to use, in the order you want to reveal them. Untapped items will not be used."
      )}</p>
      ${excluded > 0 ? `<p class="sub">${T(
        "回答が3問未満の"+excluded+"人は出題対象から除外しています(回答者としては参加できます)。",
        excluded+" person(s) with fewer than 3 filled answers are excluded as subjects (they can still play)."
      )}</p>` : ""}
      <select id="selTarget" style="margin-top:8px">
        <option value="">${T("答えにする人を選ぶ","Select the answer person")}</option>` +
        eligible.map(p => `<option value="${esc(p.name)}" ${ui.target === p.name ? "selected" : ""}>${esc(p.name)}</option>`).join("") +
      `</select>` +
      (person ? `<div style="margin-top:6px">` +
        (skipped > 0 ? `<p class="sub">${T("空欄の項目"+skipped+"件は自動的に除外しています。","Automatically excluded "+skipped+" blank item(s).")}</p>` : "") +
        usable.map(c => {
          const idx = ui.order.indexOf(c);
          return `<button class="hintPick ${idx >= 0 ? "on" : ""}" data-hint="${esc(c)}">
            <span class="orderTag" style="visibility:${idx >= 0 ? "visible" : "hidden"}">${idx + 1}</span>
            <span style="flex:1"><span class="stopLabel">${esc(c)}</span><br><b>${esc(person.hints[c])}</b></span>
          </button>`;
        }).join("") +
        `<div style="display:flex; gap:8px; margin-top:12px; align-items:center">
          <label class="sub" style="flex:1; display:flex; align-items:center; gap:6px; margin:0">
            <input type="checkbox" id="chkPractice" style="width:auto" ${ui.practice ? "checked" : ""}>
            ${T("例題にする(得点なし)","Make this practice (no points)")}
          </label>
          <select id="selMult" style="flex:1">
            <option value="1" ${ui.mult === 1 ? "selected" : ""}>${T("得点 通常(×1)","Score: Normal (x1)")}</option>
            <option value="2" ${ui.mult === 2 ? "selected" : ""}>${T("得点 2倍タイム","Score: 2x Time")}</option>
            <option value="3" ${ui.mult === 3 ? "selected" : ""}>${T("得点 3倍タイム","Score: 3x Time")}</option>
          </select>
        </div>
        <button class="btn-p" id="btnStart" style="margin-top:12px" ${ui.order.length ? "" : "disabled"}>
          ${T("この順番で出題を開始","Start question in this order")}(${ui.order.length} ${T("ヒント","hints")}${ui.practice ? "・" + T("例題","practice") : (ui.mult > 1 ? "・" + ui.mult + "x" : "")}${ui.final ? "・🏁" : ""})</button></div>` : "") +
      `</div>`;
  }

  let roundCard = "";
  if (r) {
    const rBadge = (r.practice
      ? `<span class="pill wait">${T("例題","Practice")}</span>`
      : ((r.mult || 1) > 1 ? `<span class="pill" style="background:#FFE3B0;color:#8A5B00">${r.mult}${T("倍タイム","x Time")}</span>` : ""))
      + (r.final ? ` <span class="pill ng">🏁 ${T("最終問題","Final Q")}</span>` : "");
    const ctrl = r.status === "running"
      ? `<div style="display:flex; gap:8px; flex-wrap:wrap">
          <button class="btn-p" id="btnReveal" style="flex:1 1 100%" ${r.revealed >= order.length ? "disabled" : ""}>
            ${r.revealed >= order.length ? T("全ヒント公開済み","All hints revealed") : T("次のヒントを公開","Reveal next hint")+` (${(r.revealed || 0) + 1}/${order.length})`}</button>
          <button class="btn-o" id="btnFinish" style="flex:1">${T("答えを発表する","Reveal the answer")}</button></div>`
      : ((r.final
          ? `<p class="sub">🏁 ${T("最終問題が終わりました。下の「演出」から結果発表ができます。","The final question is over. Use 'Presentation' below to reveal the results.")}</p>`
          : "") + `<button class="btn-p" id="btnNext">${T("次の問題へ","Next question")}</button>`);
    roundCard = `<div class="card"><p class="h">${T("答え","Answer")}: ${esc(r.target)} ${rBadge}</p>` +
      routeHtml(order, r.revealed || 0, r.hintValues || {}, true, false, r.target) + ctrl + `</div>`;

    const answerable = players.filter(p => p.name !== r.target);
    const answered = answerable.filter(p => p.answers[r.id]);
    roundCard += `<div class="card"><p class="h">${T("回答状況","Answer status")} (${answered.length}/${answerable.length} ${T("人","people")})</p>
      <table><thead><tr><th>${T("名前","Name")}</th><th>${T("回答","Answer")}</th><th>${T("時点","At")}</th><th>${T("判定","Result")}</th></tr></thead><tbody>` +
      players.map(p => {
        if (p.name === r.target) {
          const b = r.status === "finished" ? subjectBonus(r.id, r.target, order.length, r.mult, r.practice) : null;
          const judge = r.status === "finished"
            ? (r.practice ? `<span class="pill wait">🎯 ${T("出題対象(例題)","Subject (practice)")}</span>`
                          : `<span class="pill ok">🎯 ${T("出題対象","Subject")} +${b}</span>`)
            : `<span class="pill wait">🎯 ${T("出題対象","Subject")}</span>`;
          return `<tr><td>${esc(p.name)}</td><td>-</td><td>-</td><td>${judge}</td></tr>`;
        }
        const a = p.answers[r.id];
        const judge = a
          ? (a.choice === r.target
            ? (r.practice
              ? `<span class="pill ok">${T("正解(例題)","Correct (practice)")}</span>`
              : `<span class="pill ok">${T("正解","Correct")} +${pointsFor(order.length, a.k, r.mult)}</span>`)
            : `<span class="pill ng">${T("不正解","Wrong")}</span>`)
          : `<span class="pill wait">${T("未回答","No answer")}</span>`;
        return `<tr><td>${esc(p.name)}</td><td>${a ? esc(a.choice) : "-"}</td><td>${a ? T("ヒント","Hint")+a.k : "-"}</td><td>${judge}</td></tr>`;
      }).join("") + `</tbody></table></div>`;
  }

  /* 演出コントロール / presentation controls */
  const sc = S.scene;
  const groups = podiumGroups(scores);
  let sceneBtns = "";
  if (!sc) {
    sceneBtns = `<div style="display:flex; gap:8px; flex-wrap:wrap">
      <button class="btn-o" id="btnSceneStandings" style="flex:1">📊 ${T("暫定順位を大写し","Show standings")}</button>
      <button class="btn-p" id="btnSceneResults" style="flex:1">🏆 ${T("結果発表を開始","Start final results")}</button>
    </div>`;
  } else if (sc.type === "standings") {
    sceneBtns = `<p class="sub">📊 ${T("暫定順位を表示中です。","Standings are being shown to everyone.")}</p>
      <button class="btn-o" id="btnSceneEnd">${T("表示を終了(通常画面に戻す)","End display (back to normal)")}</button>`;
  } else if (sc.type === "results") {
    const steps = sc.revealed || 0;
    const labels = [T("3位を発表","Reveal 3rd"), T("2位を発表","Reveal 2nd"), T("1位を発表!","Reveal 1st!")];
    const nextLabel = labels[Math.min(steps + (3 - groups.length), 2)] || labels[2];
    sceneBtns = (steps < groups.length
      ? `<button class="btn-p" id="btnSceneNext">🥁 ${nextLabel} (${steps}/${groups.length})</button>`
      : `<p class="sub">🎉 ${T("すべて発表しました!","All revealed!")}</p>`) +
      `<button class="btn-o" id="btnSceneEnd" style="margin-top:8px">${T("演出を終了(通常画面に戻す)","End display (back to normal)")}</button>`;
  }
  const sceneCard = `<div class="card"><p class="h">🎬 ${T("演出","Presentation")}</p>
    <p class="sub">${T(
      "発動すると全参加者の画面がこの表示に切り替わります。問題の進行中は使わず、問題と問題の間で使ってください。結果発表は3位→2位→1位の順に、あなたのボタン操作で1段階ずつ公開されます。",
      "When activated, every player's screen switches to this display. Use it between questions, not during one. Final results are revealed step by step (3rd → 2nd → 1st) as you press the button."
    )}</p>${sceneBtns}</div>`;

  $app.innerHTML =
    `<div class="topbar"><span class="brand">${T("運営コンソール","Host Console")}</span>
     <button class="link" id="btnLeave">${T("トップへ戻る","Back to top")}</button></div>` +
    boardHtml(
      r ? T("第"+qNum()+"問 進行中","Q"+qNum()+" in progress") : T("待機中","Waiting"),
      r ? T("ヒント","Hint")+` ${r.revealed || 0}/${order.length}` : T("参加","Joined")+` ${players.length}${T("人","")}`
    ) +
    `<div class="card"><p class="h">${T("参加者データ(CSV)","Participant data (CSV)")}</p>` +
    (people.length
      ? `<p class="sub">${T(people.length+"人 ・ ヒント"+cols.length+"種類", people.length+" people, "+cols.length+" hint types")} (${cols.map(esc).join(" / ")})</p>`
      : `<p class="sub">${T(
          "1列目=名前、2列目以降=ヒントのCSVをアップロードしてください。",
          "Upload a CSV where column 1 = name and the remaining columns = hints."
        )}</p>`) +
    `<input type="file" id="inCsv" accept=".csv,text/csv" style="margin-top:8px"></div>` +
    makeCard + roundCard + sceneCard +
    `<div class="card"><p class="h">${T("全体ランキング","Overall Leaderboard")}</p>${leaderboardHtml(scores, null)}</div>
     <div class="card"><p class="h">${T("リセット","Reset")}</p>
      <p class="sub">${T(
        "レクを最初からやり直すときに使います。CSVデータ・得点・履歴・参加者名簿をすべて消去して完全に初期化します(運営の暗証番号のみ残ります)。",
        "Use this to start the game over from scratch. This fully erases the CSV data, scores, history, and participant list (only the host PIN is kept)."
      )}</p>
      <button class="btn-o btn-sm" id="btnReset" style="margin-top:8px">${T("すべてリセット","Reset everything")}</button></div>`;

  document.getElementById("btnLeave").onclick = () => { mode = "entry"; render(); };
  document.getElementById("inCsv").onchange = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    try {
      const rows = parseCSV(await f.text());
      if (rows.length < 2) {
        alert(T(
          "CSVを読み込めませんでした。1行目が見出し、2行目以降がデータになっているか確認してください。",
          "Could not read the CSV. Make sure row 1 is the header and data starts from row 2."
        ));
        return;
      }
      /* Firebaseのキーに使えない文字 . # $ / [ ] を全角に置換し、空・重複も解消
         Replace characters invalid as Firebase keys with full-width equivalents; resolve blanks/duplicates */
      const sanitize = (s) => String(s || "").trim()
        .replace(/\./g, "。").replace(/#/g, "#").replace(/\$/g, "$")
        .replace(/\//g, "/").replace(/\[/g, "[").replace(/\]/g, "]");
      const headersRaw = rows[0].map(sanitize);
      const seen = {};
      const headers = headersRaw.map(h => {
        if (!h) return "";
        if (seen[h]) { seen[h]++; return h + "(" + seen[h] + ")"; }
        seen[h] = 1; return h;
      });
      const hintCols = headers.slice(1).filter(c => c);
      const colIdx = headers.slice(1).map((c, i) => c ? i + 1 : -1).filter(i => i >= 0);
      const ppl = rows.slice(1).map(row => {
        const name = String(row[0] || "").trim();
        const hints = {};
        hintCols.forEach((c, j) => hints[c] = String(row[colIdx[j]] ?? "").trim());
        return { name, hints };
      }).filter(p => p.name);
      if (!ppl.length || !hintCols.length) {
        alert(T(
          "名前列またはヒント列が見つかりません。1列目が名前になっているか確認してください。",
          "No name column or hint columns found. Make sure column 1 contains names."
        ));
        return;
      }
      await roomRef.child("game/cols").set(hintCols);
      await roomRef.child("game/people").set(ppl);
      ui.target = ""; ui.order = [];
      alert(T("CSVを読み込みました","CSV loaded") + `: ${ppl.length}${T("人","people")} ・ ${T("ヒント","hints")}${hintCols.length}${T("種類","types")}`);
    } catch (err) {
      alert(T("CSVの取り込みに失敗しました。","Failed to import the CSV.") + "\n\n" + explainError(err));
    }
  };
  const selT = document.getElementById("selTarget");
  if (selT) selT.onchange = e => { ui.target = e.target.value; ui.order = []; render(); };
  const chkP = document.getElementById("chkPractice");
  if (chkP) chkP.onchange = e => { ui.practice = e.target.checked; render(); };
  const chkF = document.getElementById("chkFinal");
  if (chkF) chkF.onchange = e => { ui.final = e.target.checked; render(); };
  const bStand = document.getElementById("btnSceneStandings");
  if (bStand) bStand.onclick = () => roomRef.child("scene").set({ type: "standings" });
  const bRes = document.getElementById("btnSceneResults");
  if (bRes) bRes.onclick = () => roomRef.child("scene").set({ type: "results", revealed: 0 });
  const bNext = document.getElementById("btnSceneNext");
  if (bNext) bNext.onclick = () => roomRef.child("scene/revealed").transaction(v => (v || 0) + 1);
  const bEnd = document.getElementById("btnSceneEnd");
  if (bEnd) bEnd.onclick = () => roomRef.child("scene").remove();
  const selM = document.getElementById("selMult");
  if (selM) selM.onchange = e => { ui.mult = parseInt(e.target.value, 10) || 1; render(); };
  document.querySelectorAll("[data-hint]").forEach(b => b.onclick = () => {
    const c = b.dataset.hint;
    const i = ui.order.indexOf(c);
    if (i >= 0) ui.order.splice(i, 1); else ui.order.push(c);
    render();
  });
  const start = document.getElementById("btnStart");
  if (start) start.onclick = async () => {
    if (!person || !ui.order.length) return;
    const hintValues = {};
    ui.order.forEach(c => hintValues[c] = person.hints[c] || "");
    await roomRef.child("round").set({
      id: "r" + Date.now().toString(36),
      target: person.name,
      order: [...ui.order],
      hintValues,
      revealed: 0,
      status: "running",
      practice: ui.practice,
      mult: ui.mult,
      final: ui.final,
      startedAt: Date.now()
    });
    ui.target = ""; ui.order = []; ui.practice = false; ui.mult = 1; ui.final = false;
  };
  const reveal = document.getElementById("btnReveal");
  if (reveal) reveal.onclick = () =>
    roomRef.child("round/revealed").transaction(v => Math.min((v || 0) + 1, order.length));
  const finish = document.getElementById("btnFinish");
  if (finish) finish.onclick = async () => {
    await roomRef.child("round").update({ status: "finished", revealed: order.length });
    await roomRef.child("history").push({ id: r.id, target: r.target, total: order.length, practice: !!r.practice, mult: r.mult || 1 });
  };
  const next = document.getElementById("btnNext");
  if (next) next.onclick = () => roomRef.child("round").remove();
  document.getElementById("btnReset").onclick = async () => {
    if (!confirm(T(
      "CSVデータを含め、すべて完全に初期化します(残るのは運営の暗証番号だけです)。よろしいですか?",
      "This will completely reset everything including CSV data (only the host PIN will remain). Are you sure?"
    ))) return;
    await roomRef.child("round").remove();
    await roomRef.child("history").remove();
    await roomRef.child("players").remove();
    await roomRef.child("game/cols").remove();
    await roomRef.child("game/people").remove();
    await roomRef.child("scene").remove();
    ui.target = ""; ui.order = []; ui.practice = false; ui.mult = 1; ui.final = false;
  };
}

function render(){
  if (!configured) { renderSetupGuide(); return; }
  if (initError) {
    $app.innerHTML = boardHtml(T("この人はだあれ?","Who Is This?"), T("エラー","Error")) +
      `<div class="card"><p class="h">${T("起動できませんでした","Failed to start")}</p>
       <p class="sub err" style="white-space:pre-line">${esc(explainError(initError))}</p></div>`;
    return;
  }
  if (mode === "entry") renderEntry();
  else if (mode === "player") renderPlayer();
  else renderHost();
}
render();
</script>
</body>
</html>
